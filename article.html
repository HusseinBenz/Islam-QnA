<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Islamic Q&A — clear answers to common doubts.">
  <title>Article — Discover Islam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <!-- Floating Acrylic Navigation -->
  <nav class="site-nav">
    <div class="site-nav__inner">
      <a href="index.html" class="site-nav__brand" id="nav-brand">Discover Islam</a>
      <div class="site-nav__links">
        <a href="index.html" id="nav-home"></a>
        <a href="browse.html" id="nav-browse"></a>
        <span class="nav-separator"></span>
        <a href="" class="nav-icon-btn" id="nav-github" target="_blank" rel="noopener" aria-label="GitHub">
          <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        </a>
        <button type="button" class="nav-icon-btn" id="theme-toggle" aria-label="Toggle theme">&#x2600;</button>
      </div>
    </div>
  </nav>

  <!-- Article Content -->
  <main class="article-page">
    <div class="article" id="article-container">
      <div class="loading-spinner"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <p class="site-footer__label" id="footer-lang-label"></p>
    <div class="lang-switcher" id="lang-switcher"></div>
    <p class="site-footer__copyright" id="footer-copyright"></p>
  </footer>

  <script src="assets/js/theme.js"></script>
  <script src="assets/js/background.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/votes.js"></script>
  <script>
    (function () {
      function escapeHtml(str) { var d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

      function isSafeUrl(url) {
        if (!url) return true;
        var t = String(url).trim().toLowerCase();
        if (t.startsWith('javascript:') || t.startsWith('data:') || t.startsWith('vbscript:')) return false;
        if (t.startsWith('#') || t.startsWith('/') || t.startsWith('./') || t.startsWith('../')) return true;
        try { var p = new URL(url, window.location.origin); return ['http:','https:','mailto:','tel:'].indexOf(p.protocol) !== -1; } catch(e) { return false; }
      }

      function setupMarked() {
        if (typeof marked === 'undefined') return;
        var r = new marked.Renderer();
        r.link = function(href,title,text) { if(!isSafeUrl(href))return escapeHtml(text); return '<a href="'+escapeHtml(href)+'"'+(title?' title="'+escapeHtml(title)+'"':'')+' target="_blank" rel="noopener">'+text+'</a>'; };
        r.image = function(h,t,text) { return escapeHtml(text||''); };
        r.html = function() { return ''; };
        marked.setOptions({ renderer:r, gfm:true, breaks:true, mangle:false, headerIds:false });
      }

      function formatDate(ds) { if(!ds)return''; try{return new Date(ds).toLocaleDateString(I18n.getLang(),{year:'numeric',month:'long',day:'numeric'});}catch(e){return ds;} }

      function renderArticle(entry) {
        var c = document.getElementById('article-container');
        var html = '<h1 class="article__question">' + escapeHtml(entry.question) + '</h1>';
        html += '<div class="article__meta"><span class="article__date">' + escapeHtml(I18n.t('posted_on')) + ' ' + formatDate(entry.created_at) + '</span></div>';
        if (entry.tags && entry.tags.length) { html += '<div class="article__tags">'; entry.tags.forEach(function(t){ html+='<span class="tag">'+escapeHtml(t)+'</span>'; }); html += '</div>'; }

        var answerHtml = typeof marked !== 'undefined' ? marked.parse(entry.answer||'') : '<p>'+escapeHtml(entry.answer||'').replace(/\n/g,'<br>')+'</p>';
        html += '<div class="article__answer">' + answerHtml + '</div>';

        // Share section
        var pageUrl = window.location.href;
        var shareText = entry.question;
        html += '<div class="share-section">';
        html += '<span class="share-section__label">' + escapeHtml(I18n.t('share')) + '</span>';
        // X (Twitter)
        html += '<a href="https://x.com/intent/tweet?text='+encodeURIComponent(shareText)+'&url='+encodeURIComponent(pageUrl)+'" target="_blank" rel="noopener" class="share-btn" title="'+escapeHtml(I18n.t('share_twitter'))+'">';
        html += '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>';
        html += '</a>';
        // WhatsApp
        html += '<a href="https://wa.me/?text='+encodeURIComponent(shareText + ' ' + pageUrl)+'" target="_blank" rel="noopener" class="share-btn" title="'+escapeHtml(I18n.t('share_whatsapp'))+'">';
        html += '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>';
        html += '</a>';
        // Copy link
        html += '<button type="button" class="share-btn share-btn--copy" id="copy-link-btn" title="'+escapeHtml(I18n.t('share_copy'))+'">';
        html += '<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>';
        html += '</button>';
        html += '</div>';

        // Voting section
        var cv = Votes.getVote(entry.id);
        html += '<div class="vote-section"><div class="vote-widget"><div class="vote-buttons">';
        html += '<button class="vote-btn'+(cv===1?' active-up':'')+'" data-vote="1" aria-label="Like"><svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1.91l-.01-.01L23 10z"/></svg><span class="vote-count" id="vote-up">'+(cv===1?'1':'0')+'</span></button>';
        html += '<button class="vote-btn'+(cv===-1?' active-down':'')+'" data-vote="-1" aria-label="Dislike"><svg viewBox="0 0 24 24"><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v1.91l.01.01L1 14c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"/></svg><span class="vote-count" id="vote-down">'+(cv===-1?'1':'0')+'</span></button>';
        html += '</div>';
        var pct = cv===1?100:(cv===-1?0:50);
        html += '<div class="vote-bar"><div class="vote-bar__fill" style="width:'+pct+'%"></div></div>';
        html += '<div class="vote-message" id="vote-message"></div></div></div>';

        c.innerHTML = html;

        // Copy link handler
        var copyBtn = document.getElementById('copy-link-btn');
        if (copyBtn) {
          copyBtn.addEventListener('click', function() {
            navigator.clipboard.writeText(window.location.href).then(function() {
              copyBtn.classList.add('copied');
              setTimeout(function(){ copyBtn.classList.remove('copied'); }, 2000);
            });
          });
        }

        // Vote handlers
        document.querySelectorAll('.vote-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var vv = parseInt(this.getAttribute('data-vote'));
            var nv = Votes.castVote(entry.id, vv);
            document.querySelectorAll('.vote-btn').forEach(function(b){ b.classList.remove('active-up','active-down'); });
            if(nv===1) document.querySelector('[data-vote="1"]').classList.add('active-up');
            else if(nv===-1) document.querySelector('[data-vote="-1"]').classList.add('active-down');
            document.getElementById('vote-up').textContent = nv===1?'1':'0';
            document.getElementById('vote-down').textContent = nv===-1?'1':'0';
            document.querySelector('.vote-bar__fill').style.width = (nv===1?100:(nv===-1?0:50))+'%';
            var msg = document.getElementById('vote-message');
            msg.textContent = I18n.t('vote_thank');
            setTimeout(function(){ msg.textContent=''; }, 2500);
          });
        });
      }

      function renderMissing() {
        document.getElementById('article-container').innerHTML = '<div class="empty-state"><div class="empty-state__icon">&#128196;</div><div class="empty-state__text">'+escapeHtml(I18n.t('entry_missing'))+'</div></div>';
      }

      setupMarked();

      DataStore.loadAll().then(function (data) {
        var lang = I18n.init(data.uiStrings, data.languages, data.config.defaultLang);

        document.getElementById('nav-brand').textContent = I18n.t('title');
        document.getElementById('nav-home').textContent = I18n.t('back_home');
        document.getElementById('nav-browse').textContent = I18n.t('search');
        document.getElementById('nav-github').href = data.config.githubUrl || '#';
        document.querySelector('.site-nav__links a[href^="index"]').href = 'index.html?lang=' + lang;
        document.querySelector('.site-nav__links a[href^="browse"]').href = 'browse.html?lang=' + lang + '&browse=1';

        var params = new URLSearchParams(window.location.search);
        var entryId = parseInt(params.get('id'));
        if (!entryId) { renderMissing(); }
        else {
          var entry = DataStore.getEntry(data.entries, entryId, lang, data.config.defaultLang);
          if (entry) { document.title = entry.question + ' — ' + I18n.t('title'); renderArticle(entry); }
          else { renderMissing(); }
        }

        document.getElementById('footer-lang-label').textContent = I18n.t('languages');
        document.getElementById('footer-copyright').textContent = I18n.t('footer_no_copyright');
        var sw = document.getElementById('lang-switcher');
        Object.keys(I18n.getLanguages()).forEach(function(code){ var a=document.createElement('a'); a.href='article.html?id='+(entryId||'')+'&lang='+code; a.textContent=I18n.getLanguages()[code].label; if(code===lang)a.classList.add('active'); sw.appendChild(a); });

        Theme.init();
      });
    })();
  </script>
</body>
</html>
